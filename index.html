<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMaster - Středoškolská Biologie</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #52b788;
            --accent: #d8f3dc;
            --text: #1b4332;
            --error: #e76f51;
            --success: #80b918;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        .stats { font-size: 0.9rem; margin-bottom: 1rem; color: #666; }

        .question-container {
            margin: 2rem 0;
            min-height: 150px;
        }

        .options-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr 1fr;
        }

        button {
            padding: 12px 15px;
            border: 2px solid var(--secondary);
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            font-family: inherit;
        }

        button:hover {
            background: var(--accent);
        }

        button.correct {
            background: var(--success) !important;
            color: white;
            border-color: var(--success);
        }

        button.wrong {
            background: var(--error) !important;
            color: white;
            border-color: var(--error);
        }

        #next-btn {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 30px;
            display: none;
        }

        .category-badge {
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        #image-placeholder {
            width: 100%;
            height: 150px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
    </style>
</head>
<body>

<div id="app">
    <span class="category-badge" id="category">Biologie</span>
    <h1 id="title">BioKvíz</h1>
    <div class="stats">Otázka: <span id="q-count">0</span>/100 | Skóre: <span id="score">0</span></div>
    
    <div id="image-placeholder">🧬</div>

    <div class="question-container">
        <h3 id="question-text">Načítání otázky...</h3>
        <div class="options-grid" id="options">
            </div>
    </div>

    <button id="next-btn" onclick="nextQuestion()">Další otázka</button>
</div>

<script>
    const questions = [
        {
            q: "Která organela je zodpovědná za buněčné dýchání a výrobu ATP?",
            a: ["Ribozom", "Mitochondrie", "Golgiho aparát", "Lysozom"],
            correct: 1,
            cat: "Cytologie",
            icon: "🔋"
        },
        {
            q: "Jak se nazývá proces dělení jádra somatických buněk?",
            a: ["Meióza", "Fragmentace", "Mitóza", "Pučení"],
            correct: 2,
            cat: "Cytologie",
            icon: "✂️"
        },
        {
            q: "Který vědec je považován za zakladatele genetiky?",
            a: ["Charles Darwin", "J. G. Mendel", "Louis Pasteur", "Jan Janský"],
            correct: 1,
            cat: "Genetika",
            icon: "🌱"
        },
        {
            q: "Kolik chromozomů má zdravá lidská tělní buňka?",
            a: ["23", "48", "44", "46"],
            correct: 3,
            cat: "Biologie člověka",
            icon: "🧬"
        },
        {
            q: "Která céva vede okysličenou krev ze srdce do těla?",
            a: ["Aorta", "Plicnice", "Horní dutá žíla", "Vlásečnice"],
            correct: 0,
            cat: "Biologie člověka",
            icon: "❤️"
        },
        {
            q: "Který plyn je hlavním produktem fotosyntézy?",
            a: ["Oxid uhličitý", "Dusík", "Kyslík", "Vodík"],
            correct: 2,
            cat: "Botanika",
            icon: "🍃"
        }
        // Zde můžeš přidat dalších 94 otázek podle stejného vzoru...
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const qText = document.getElementById('question-text');
    const optionsBox = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const scoreText = document.getElementById('score');
    const countText = document.getElementById('q-count');
    const categoryTag = document.getElementById('category');
    const iconBox = document.getElementById('image-placeholder');

    function loadQuestion() {
        const q = questions[currentQuestionIndex];
        qText.innerText = q.q;
        categoryTag.innerText = q.cat;
        iconBox.innerText = q.icon;
        optionsBox.innerHTML = '';
        nextBtn.style.display = 'none';

        q.a.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.innerText = option;
            btn.onclick = () => checkAnswer(index, btn);
            optionsBox.appendChild(btn);
        });

        countText.innerText = currentQuestionIndex + 1;
    }

    function checkAnswer(selected, btn) {
        const correct = questions[currentQuestionIndex].correct;
        const allButtons = optionsBox.querySelectorAll('button');

        if (selected === correct) {
            btn.classList.add('correct');
            score++;
            scoreText.innerText = score;
        } else {
            btn.classList.add('wrong');
            allButtons[correct].classList.add('correct');
        }

        allButtons.forEach(b => b.disabled = true);
        nextBtn.style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.querySelector('.question-container').innerHTML = `
            <h2>Konec kvízu!</h2>
            <p>Tvé výsledné skóre je ${score} z ${questions.length}.</p>
            <button onclick="location.reload()">Zkusit znovu</button>
        `;
        nextBtn.style.display = 'none';
    }

    // Inicializace
    loadQuestion();
</script>

</body>
</html>
