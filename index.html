<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMaster - Středoškolská Biologie</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #52b788;
            --accent: #d8f3dc;
            --text: #1b4332;
            --error: #e76f51;
            --success: #80b918;
            --bg: #f0fdf4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #dcfce7 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            background: white;
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 650px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .category-badge {
            background: var(--accent);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #555;
            display: flex;
            justify-content: space-around;
        }

        #image-placeholder {
            font-size: 4rem;
            margin: 20px 0;
            background: #f8f9fa;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }

        h3 { margin: 1.5rem 0; line-height: 1.4; min-height: 60px; }

        .options-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        button {
            padding: 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 500;
        }

        button:hover:not(:disabled) {
            border-color: var(--secondary);
            background: var(--accent);
        }

        button.correct {
            background: var(--success) !important;
            color: white;
            border-color: var(--success);
        }

        button.wrong {
            background: var(--error) !important;
            color: white;
            border-color: var(--error);
        }

        #next-btn {
            margin-top: 25px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: 600;
            display: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
        }

        #next-btn:hover { background: #1b4332; }
    </style>
</head>
<body>

<div id="app">
    <span class="category-badge" id="category">Načítání...</span>
    
    <div class="stats">
        <div>Otázka: <strong id="q-count">0</strong> / 100</div>
        <div>Skóre: <strong id="score">0</strong></div>
    </div>
    
    <div id="image-placeholder">🧬</div>

    <div id="quiz-content">
        <h3 id="question-text">Připravte se, kvíz začíná...</h3>
        <div class="options-grid" id="options"></div>
    </div>

    <button id="next-btn">Další otázka →</button>
</div>

<script src="script.js"></script>
</body>
</html>
